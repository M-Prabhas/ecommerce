spring.application.name=apigateway
server.port=0

eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka

logging.level.org.springframework.cloud.gateway=trace
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=true

##productservice route
spring.cloud.gateway.routes[0].id=productservice
spring.cloud.gateway.routes[0].uri=lb://productservice ## lb stands for load balancer, it will look for the instances of productservice in eureka and load balance between them
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**

##orderservice route
spring.cloud.gateway.routes[1].id=orderservice
spring.cloud.gateway.routes[1].uri=lb://orderservice
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**

##inventoryservice route
spring.cloud.gateway.routes[2].id=inventoryservice
spring.cloud.gateway.routes[2].uri=lb://inventoryservice
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/inventory/** 

##discoveryservice route
spring.cloud.gateway.routes[3].id=discoveryservice
spring.cloud.gateway.routes[3].uri=http://localhost:8761
spring.cloud.gateway.routes[3].predicates[0]=Path=/eureka/web
spring.cloud.gateway.routes[3].filters[0]=setPath=/  ## like this we can remove the /eureka prefix and forward the request to eureka server

##discoverservice static route
spring.cloud.gateway.routes[4].id=discoveryservice-static
spring.cloud.gateway.routes[4].uri=http://localhost:8761
spring.cloud.gateway.routes[4].predicates[0]=Path=/eureka/**



spring.application.name=inventoryservice
server.port=0 // it takes any port at run time no of times we run it creates the new instance every time
spring.datasource.url=jdbc:mysql://localhost:3306/inventorydb
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
eureka.client.serviceUrl.defaultZone=http://eureka:password@localhost:8761/eureka

### for zipkin ui for visibility of requests and sleuth for tracing
spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0
spring.sleuth.web.client.enabled=true
